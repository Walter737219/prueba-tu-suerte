<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Prueba tu Suerte</title>

    <style>

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #141e30, #243b55);
            color: white;
            text-align: center;
            padding-top: 40px;
        }

        .contenedor {
            background: rgba(255,255,255,0.1);
            width: 450px;
            margin: auto;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0px 0px 20px black;
        }

        h1 {
            margin-bottom: 20px;
        }

        button {
            padding: 12px 25px;
            font-size: 18px;
            border: none;
            border-radius: 10px;
            background: gold;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
        }

        button:hover {
            transform: scale(1.05);
        }

        img {
            width: 350px;
            height: 500px;
            object-fit: cover;
            border-radius: 20px;
            margin-top: 20px;
            display: none;

            /* CENTRAR IMAGEN */
            margin-left: auto;
            margin-right: auto;
        }

        #mensaje {
            margin-top: 20px;
            font-size: 26px;
            font-weight: bold;
        }

        #compartirBtn {
            display: none;
            background: #25D366;
            color: white;
        }

    </style>

</head>
<body>

    <div class="contenedor">

        <h1>🎲 Prueba tu Suerte</h1>

        <button id="btnSuerte" onclick="sacarJugador()">
            Sacar Jugador
        </button>

        <p id="mensaje"></p>

        <img id="imagenJugador" alt="Jugador">

        <br>

        <button id="compartirBtn" onclick="compartirResultado()">
            📤 Compartir Resultado
        </button>

    </div>

    <script>

        const jugadores = [

            {
                nombre: "Walter",
                imagen: "Walter.jpeg",
                suerte: true
            },

            {
                nombre: "Chope",
                imagen: "Chope.jpeg",
                suerte: true
            },

            {
                nombre: "Genaro",
                imagen: "Genaro.jpeg",
                suerte: false
            },

            {
                nombre: "Brahian",
                imagen: "Brahian.jpeg",
                suerte: false
            },

            {
                nombre: "Joubert",
                imagen: "Joubert.jpeg",
                suerte: true
            }

        ];

        let resultadoFinal = "";

        function sacarJugador() {

            let numero = Math.floor(Math.random() * jugadores.length);

            let jugador = jugadores[numero];

            let mensaje = document.getElementById("mensaje");

            let imagen = document.getElementById("imagenJugador");

            let boton = document.getElementById("btnSuerte");

            let compartir = document.getElementById("compartirBtn");

            if (jugador.suerte === true) {

                resultadoFinal =
                    "🍀 Tenés suerte, te salió " + jugador.nombre;

                mensaje.style.color = "lime";

            } else {

                resultadoFinal =
                    "💀 No tenés suerte, te salió " + jugador.nombre;

                mensaje.style.color = "red";
            }

            mensaje.innerHTML = resultadoFinal;

            imagen.src = jugador.imagen;

            imagen.style.display = "block";

            /* SOLO UNA OPORTUNIDAD */

            boton.disabled = true;

            boton.innerHTML = "Ya probaste tu suerte";

            boton.style.background = "gray";

            compartir.style.display = "inline-block";
        }

        function compartirResultado() {

            let texto =
                "🎲 Probé mi suerte y este fue mi resultado:\n\n" +
                resultadoFinal;

            navigator.clipboard.writeText(texto);

            alert("✅ Resultado copiado. Ahora puedes pegarlo y compartirlo.");
        }

    </script>

</body>
</html>
